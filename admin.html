<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Pedidos</title>
</head>
<body>
    <div id="loginSection">
        <h2>Acceso Administrativo</h2>
        <input type="password" id="adminPassword" placeholder="Contraseña">
        <button id="loginBtn">Ingresar</button>
        <p id="loginError" style="color: red; display: none;">Contraseña incorrecta</p>
    </div>

    <div id="dashboardSection" style="display: none;">
        <h2>Gestión de Pedidos</h2>
        <button id="logoutBtn">Cerrar Sesión</button>
        <button id="refreshBtn">Actualizar Datos</button>
        
        <table border="1" style="margin-top: 20px; width: 100%; text-align: left;">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Nombre</th>
                    <th>Dirección</th>
                    <th>Teléfono</th>
                    <th>Producto</th>
                    <th>Cantidad</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody">
                </tbody>
        </table>
</table>

        <hr style="margin-top: 40px;">
        <h3>Añadir Nuevo Producto al Inventario</h3>
        <form id="stockForm" style="margin-top: 20px;">
            <input type="text" id="prodNombre" placeholder="Nombre de la Laptop (Ej: Dell 5400)" required><br><br>
            <input type="number" id="prodPrecio" placeholder="Precio (Ej: 480)" required><br><br>
            <input type="url" id="prodImagen" placeholder="URL de la Imagen" required><br><br>
            <input type="number" id="prodStock" placeholder="Cantidad en Stock" required><br><br>
            <button type="submit">Guardar Producto</button>
        </form>
        </div>

    <script type="module" src="./js/auth.js"></script>
    <script type="module" src="./js/admin.js"></script>
</body>
</html>
