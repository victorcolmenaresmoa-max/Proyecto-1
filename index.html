<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Productos</title>
    <style>
        /* Estilos básicos para la cuadrícula (Grid) estilo e-commerce */
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; padding: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.2s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .card img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px; }
        .price { font-size: 24px; color: #333; font-weight: bold; margin: 10px 0; }
        .btn-comprar { margin-top: auto; background: #007bff; color: white; text-align: center; padding: 10px; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .btn-comprar:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Nuestros Productos</h1>
    <div class="grid-container" id="catalogoContenedor">
        <p>Cargando catálogo...</p>
    </div>

    <script type="module" src="./js/catalogo.js"></script>
</body>
</html>
